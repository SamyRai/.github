# Consumer CI — Go service: lint/test on every change, build+push image on main.
# Drop into <repo>/.gitea/workflows/ci.yml and remove this header comment.
#
# CHANGEME: set IMAGE_NAME below to the Harbor image path (e.g. glpx/kb-server).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  go-ci:
    uses: mukimovd/.github/.gitea/workflows/go-ci.yml@main

  base-images:
    uses: mukimovd/.github/.gitea/workflows/base-images-guard.yml@main

  # Image build/push only on the default branch (PRs just run go-ci above).
  docker:
    if: gitea.ref == 'refs/heads/main' || gitea.ref == 'refs/heads/master'
    needs: [go-ci, base-images]
    uses: mukimovd/.github/.gitea/workflows/docker-ci.yml@main
    with:
      image-name: glpx/CHANGEME  # e.g. glpx/kb-server
      # context: '.'          # override if Dockerfile lives in a subdir
      # dockerfile: 'Dockerfile'
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      # Uncomment if the Dockerfile runs `go install` for @glpx npm-linked tooling
      # or `npm install` for @glpx packages:
      # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Optional: uncomment to authenticate upstream Docker Hub pulls.
      # DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      # DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
