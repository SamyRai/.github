name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include secrets, credentials, private keys, tokens, or private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly and briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible case you can.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include relevant logs or errors.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, package version, branch, or commit are you using?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, browser, database, language/runtime version, or other relevant details.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: This report does not contain secrets, credentials, or private data.
          required: true

