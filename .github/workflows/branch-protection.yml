# Branch Protection Workflow
# This workflow enforces branch protection rules via GitHub API
# Note: Branch protection must be configured in repository settings
# This serves as documentation of the expected rules

name: Branch Protection Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly check

jobs:
  check-branch-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch protection
        run: |
          echo "Branch protection rules should be configured in repository settings:"
          echo "- Require pull request reviews before merging"
          echo "- Require status checks to pass before merging"
          echo "- Require branches to be up to date before merging"
          echo "- Require conversation resolution before merging"
          echo "- Do not allow force pushes"
          echo "- Do not allow deletions"

