name: Setup @glpx npm auth
description: "Appends the @glpx Gitea registry auth to $HOME/.npmrc so Deno/Node can fetch private @glpx packages. Pass GLPX_NPM_TOKEN (bare PAT, Vault: baikonur/registry/npm-reader)."
inputs:
  token:
    description: "Bare auth token for the Gitea npm registry (GLPX_NPM_TOKEN secret)"
    required: true
runs:
  using: "composite"
  steps:
    - name: Authenticate to @glpx npm registry
      shell: bash
      run: |
        printf '//gitea.bk.glpx.pro/api/packages/glpx/npm/:_authToken=%s\n' \
          "${{ inputs.token }}" >> "$HOME/.npmrc"
        printf '@glpx:registry=https://gitea.bk.glpx.pro/api/packages/glpx/npm/\n' \
          >> "$HOME/.npmrc"
