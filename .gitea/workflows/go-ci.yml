name: Reusable Go CI
on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26'

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  test:
    # Must be amd64: this job runs `go test -race`, and the Go race detector
    # amd64 is the default platform fleet-wide; the arm64 RPi runners advertise ONLY
    # `arm64`/`rpi` (see ansible/vostok-runner.yml), so `ubuntu-latest` is guaranteed amd64.
    # The GOARCH gate on `-race` below is kept as defence-in-depth (TSan needs a 48-bit VA,
    # which the RPi 39-bit kernel lacks) for the rare explicit `runs-on: arm64` Go job.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      # The race detector (ThreadSanitizer) aborts on the cluster's arm64 RPi
      # runners with "unsupported VMA range" (39-bit VA kernel, TSan wants 48).
      # `runs-on: amd64` targets amd64, but runner-label overlap can still land
      # a job on arm64, so gate -race on the actual arch: full race coverage on
      # amd64, plain tests (no false failure) anywhere else.
      run: |
        if [ "$(go env GOARCH)" = "amd64" ]; then
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        else
          echo "::warning::$(go env GOARCH) runner: running tests without -race (ThreadSanitizer unsupported)"
          go test -v -coverprofile=coverage.out -covermode=atomic ./...
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Check go mod tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum is not tidy" && exit 1)
