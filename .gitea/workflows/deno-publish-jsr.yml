name: Reusable Deno Publish to JSR
on:
  workflow_call:
    inputs:
      deno-version:
        description: 'Deno version to use'
        required: false
        type: string
        default: 'v2.x'
    secrets:
      NPM_TOKEN:
        required: false
        description: 'Token for private npm registry (if your package relies on private npm imports during build)'

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # Required for JSR OIDC authentication

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ inputs.deno-version }}

      - name: Setup .npmrc (if using private registry)
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          echo "//gitea.glpx.pro/api/packages/glpx/npm/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          echo "@glpx:registry=https://gitea.glpx.pro/api/packages/glpx/npm/" >> .npmrc

      - name: Publish to JSR
        run: deno publish
