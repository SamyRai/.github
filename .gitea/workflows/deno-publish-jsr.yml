name: Reusable Deno Publish to JSR
on:
  workflow_call:
    inputs:
      deno-version:
        description: 'Deno version to use'
        required: false
        type: string
        default: 'v2.x'
    secrets:
      NPM_TOKEN:
        required: false
        description: 'Token for private npm registry (if your package relies on private npm imports during build)'

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # Required for JSR OIDC authentication

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ inputs.deno-version }}

      - name: Setup @glpx npm auth
        # Inlined (was a composite action in this repo): step-level `uses:`
        # references resolve against github.com on the runner, and this repo
        # only exists on gitea — the pre-clone failed every job.
        if: ${{ secrets.NPM_TOKEN != '' }}
        shell: bash
        run: |
          printf '//gitea.bk.glpx.pro/api/packages/glpx/npm/:_authToken=%s\n' \
            "${{ secrets.NPM_TOKEN }}" >> "$HOME/.npmrc"
          printf '@glpx:registry=https://gitea.bk.glpx.pro/api/packages/glpx/npm/\n' \
            >> "$HOME/.npmrc"

      - name: Publish to JSR
        run: deno publish
