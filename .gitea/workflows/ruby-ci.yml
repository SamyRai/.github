name: Reusable Ruby CI
on:
  workflow_call:
    inputs:
      ruby-version:
        description: 'Ruby version to use'
        required: false
        type: string
        default: '4.0'

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler-cache: true

    - name: Run Rubocop
      run: bundle exec rubocop

    - name: Run tests
      # Pick the test runner by what the project actually has: spec/ -> rspec,
      # test/ (Rails) -> rails test. Fail loudly if neither is present.
      run: |
        if [ -d spec ]; then
          bundle exec rspec
        elif [ -d test ]; then
          bundle exec rails test
        else
          echo "No spec/ or test/ directory found — nothing to run." >&2
          exit 1
        fi
