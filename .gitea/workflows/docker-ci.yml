name: Reusable Docker Build & Push
on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the image to build (without registry prefix)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build for. Default amd64-only (matches the amd64 cluster); pass linux/amd64,linux/arm64 explicitly to opt into multi-arch.'
        required: false
        type: string
        default: 'linux/amd64'
      build-network:
        description: 'Docker build network mode'
        required: false
        type: string
        default: 'default'
      build-allow:
        description: 'Extra BuildKit entitlements'
        required: false
        type: string
        default: ''
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
        description: 'Private @glpx Gitea npm token, forwarded as a BuildKit secret (id=glpx_npm_token) for Dockerfiles that run `deno install`/`npm install` at build time.'

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: registry.bk.glpx.pro
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          network: ${{ inputs.build-network }}
          allow: ${{ inputs.build-allow }}
          tags: registry.bk.glpx.pro/${{ inputs.image-name }}:latest
          # Forwarded only when the caller passes NPM_TOKEN; consumed by Dockerfiles
          # via `RUN --mount=type=secret,id=glpx_npm_token`. Empty otherwise (no-op).
          secrets: |
            glpx_npm_token=${{ secrets.NPM_TOKEN }}
