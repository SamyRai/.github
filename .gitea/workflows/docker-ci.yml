name: Reusable Docker Build & Push
on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the image to build (without registry prefix)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build for. Default amd64-only (matches the amd64 cluster); pass linux/amd64,linux/arm64 explicitly to opt into multi-arch.'
        required: false
        type: string
        default: 'linux/amd64'
      build-network:
        description: 'Docker build network mode'
        required: false
        type: string
        default: 'default'
      build-allow:
        description: 'Extra BuildKit entitlements'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Extra Docker build args. VERSION is always set to the immutable image tag.'
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context (defaults to repo root).'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to the Dockerfile, relative to the build context. Lets monorepos keep the Dockerfile under a subdir (e.g. smm-dashboard/Dockerfile).'
        required: false
        type: string
        default: 'Dockerfile'
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      GITEA_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
        description: 'Private @glpx Gitea npm token, forwarded as a BuildKit secret (id=glpx_npm_token) for Dockerfiles that run `deno install`/`npm install` at build time.'
    outputs:
      image-tag:
        description: 'Canonical immutable tag that was pushed: YYYYMMDDHHMMSS-<sha7>. Feed it into a GitOps values bump, or let Renovate pick it up.'
        value: ${{ jobs.build-and-push.outputs.image-tag }}

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: generic
    outputs:
      image-tag: ${{ steps.meta.outputs.stamp }}
    steps:
      - name: Checkout code from Gitea
        env:
          CHECKOUT_TOKEN: ${{ secrets.GITEA_TOKEN }}
          CHECKOUT_REPOSITORY: ${{ gitea.repository }}
          CHECKOUT_REF: ${{ gitea.ref }}
          CHECKOUT_SHA: ${{ gitea.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          find . -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          git init .
          git remote add origin "http://gitea:3000/${CHECKOUT_REPOSITORY}.git"
          case "$CHECKOUT_REF" in
            refs/heads/*)
              git -c http.extraheader="Authorization: token ${CHECKOUT_TOKEN}" fetch --depth=1 origin "+${CHECKOUT_REF}:refs/remotes/origin/${CHECKOUT_REF#refs/heads/}"
              ;;
            refs/tags/*)
              git -c http.extraheader="Authorization: token ${CHECKOUT_TOKEN}" fetch --depth=1 origin "+${CHECKOUT_REF}:refs/tags/${CHECKOUT_REF#refs/tags/}"
              ;;
            *)
              git -c http.extraheader="Authorization: token ${CHECKOUT_TOKEN}" fetch --depth=1 origin "${CHECKOUT_SHA}"
              ;;
          esac
          git checkout --force "${CHECKOUT_SHA}"

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "${DOCKERHUB_TOKEN}" | docker login docker.io --username "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Login to Harbor
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: echo "${REGISTRY_PASSWORD}" | docker login registry.bk.glpx.pro --username "${REGISTRY_USERNAME}" --password-stdin

      # Canonical platform-wide immutable tag: a sortable timestamp (so
      # "newest == highest", which Renovate's regex versioning relies on) plus the
      # short git sha for traceability. Keep this format in lockstep with the
      # Renovate versioning regex `^(\d{4})(\d{4})(\d{6})(?:-[0-9a-f]{7,40})?$`.
      # See docs/conventions/SHIP_PIPELINE.md in the cluster (helm) repo.
      - name: Compute immutable tag
        id: meta
        run: echo "stamp=$(date +%Y%m%d%H%M%S)-$(echo "${{ gitea.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          BUILD_CONTEXT: ${{ inputs.context }}
          BUILD_DOCKERFILE: ${{ inputs.dockerfile }}
          BUILD_NETWORK: ${{ inputs.build-network }}
          BUILD_ALLOW: ${{ inputs.build-allow }}
          BUILD_ARGS: ${{ inputs.build-args }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ steps.meta.outputs.stamp }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PLATFORMS: ${{ inputs.platforms }}
          SHA_TAG: ${{ gitea.sha }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          builder="gitea-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"
          docker buildx inspect "$builder" >/dev/null 2>&1 || docker buildx create --name "$builder" --use
          docker buildx use "$builder"

          build_args=(--build-arg "VERSION=${IMAGE_TAG}")
          while IFS= read -r arg; do
            [ -n "$arg" ] && build_args+=(--build-arg "$arg")
          done <<< "$BUILD_ARGS"

          allow_args=()
          while IFS= read -r entitlement; do
            [ -n "$entitlement" ] && allow_args+=(--allow "$entitlement")
          done <<< "$BUILD_ALLOW"

          secret_args=()
          if [ -n "${NPM_TOKEN}" ]; then
            secret_args+=(--secret id=glpx_npm_token,env=NPM_TOKEN)
          fi

          # `:<stamp>` is the immutable tag GitOps charts reference and Renovate
          # auto-bumps. `:latest` stays as a rolling/cache convenience alias; do
          # not reference it from a chart. `:<sha>` is kept for digest pinning and
          # back-compat with older charts.
          docker buildx build \
            --push \
            --platform "$PLATFORMS" \
            --network "$BUILD_NETWORK" \
            "${allow_args[@]}" \
            "${build_args[@]}" \
            "${secret_args[@]}" \
            --file "${BUILD_CONTEXT}/${BUILD_DOCKERFILE}" \
            --tag "registry.bk.glpx.pro/${IMAGE_NAME}:${IMAGE_TAG}" \
            --tag "registry.bk.glpx.pro/${IMAGE_NAME}:latest" \
            --tag "registry.bk.glpx.pro/${IMAGE_NAME}:${SHA_TAG}" \
            --cache-from "type=registry,ref=registry.bk.glpx.pro/${IMAGE_NAME}:buildcache" \
            --cache-to "type=registry,ref=registry.bk.glpx.pro/${IMAGE_NAME}:buildcache,mode=max" \
            "$BUILD_CONTEXT"
