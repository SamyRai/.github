name: Reusable Docker Build & Push
on:
  workflow_call:
    inputs:
      image-name:
        description: 'Name of the image to build (without registry prefix)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build for. Default amd64-only (matches the amd64 cluster); pass linux/amd64,linux/arm64 explicitly to opt into multi-arch.'
        required: false
        type: string
        default: 'linux/amd64'
      build-network:
        description: 'Docker build network mode'
        required: false
        type: string
        default: 'default'
      build-allow:
        description: 'Extra BuildKit entitlements'
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context (defaults to repo root).'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to the Dockerfile, relative to the build context. Lets monorepos keep the Dockerfile under a subdir (e.g. smm-dashboard/Dockerfile).'
        required: false
        type: string
        default: 'Dockerfile'
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
        description: 'Private @glpx Gitea npm token, forwarded as a BuildKit secret (id=glpx_npm_token) for Dockerfiles that run `deno install`/`npm install` at build time.'
    outputs:
      image-tag:
        description: 'Canonical immutable tag that was pushed: YYYYMMDDHHMMSS-<sha7>. Feed it into a GitOps values bump, or let Renovate pick it up.'
        value: ${{ jobs.build-and-push.outputs.image-tag }}

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.stamp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: registry.bk.glpx.pro
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Canonical platform-wide immutable tag: a sortable timestamp (so
      # "newest == highest", which Renovate's regex versioning relies on) plus the
      # short git sha for traceability. Keep this format in lockstep with the
      # Renovate versioning regex `^(\d{4})(\d{4})(\d{6})(?:-[0-9a-f]{7,40})?$`.
      # See docs/conventions/SHIP_PIPELINE.md in the cluster (helm) repo.
      - name: Compute immutable tag
        id: meta
        run: echo "stamp=$(date +%Y%m%d%H%M%S)-$(echo "${{ gitea.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          network: ${{ inputs.build-network }}
          allow: ${{ inputs.build-allow }}
          # `:<stamp>` is the immutable tag GitOps charts reference and Renovate
          # auto-bumps. `:latest` stays as a rolling/cache convenience alias — do
          # NOT reference it from a chart, it has no GitOps trail. `:<sha>` is kept
          # for digest pinning / back-compat with older charts.
          tags: |
            registry.bk.glpx.pro/${{ inputs.image-name }}:${{ steps.meta.outputs.stamp }}
            registry.bk.glpx.pro/${{ inputs.image-name }}:latest
            registry.bk.glpx.pro/${{ inputs.image-name }}:${{ gitea.sha }}
          # Registry-backed layer cache: shared across runners, big speedup on rebuilds.
          cache-from: type=registry,ref=registry.bk.glpx.pro/${{ inputs.image-name }}:buildcache
          cache-to: type=registry,ref=registry.bk.glpx.pro/${{ inputs.image-name }}:buildcache,mode=max
          # Forwarded only when the caller passes NPM_TOKEN; consumed by Dockerfiles
          # via `RUN --mount=type=secret,id=glpx_npm_token`. Empty otherwise (no-op).
          secrets: |
            glpx_npm_token=${{ secrets.NPM_TOKEN }}
