name: Reusable Node CI
on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '26'
    secrets:
      NPM_TOKEN:
        required: false
        description: 'Token for private npm registry (if using @glpx scoped packages)'

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Yarn
      uses: actions/cache@v5
      with:
        path: .yarn/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: Setup @glpx npm auth
      # Inlined (was a composite action in this repo): step-level `uses:`
      # references resolve against github.com on the runner, and this repo
      # only exists on gitea — the pre-clone failed every job.
      if: ${{ secrets.NPM_TOKEN != '' }}
      shell: bash
      run: |
        printf '//gitea.bk.glpx.pro/api/packages/glpx/npm/:_authToken=%s\n' \
          "${{ secrets.NPM_TOKEN }}" >> "$HOME/.npmrc"
        printf '@glpx:registry=https://gitea.bk.glpx.pro/api/packages/glpx/npm/\n' \
          >> "$HOME/.npmrc"

    - name: Install dependencies
      run: npm install -g corepack && corepack enable && yarn install --immutable || npm install

    - name: Run linter
      run: yarn lint || npm run lint

    - name: Run type check
      run: yarn typecheck || npm run typecheck

    - name: Run tests
      run: yarn test || npm test
