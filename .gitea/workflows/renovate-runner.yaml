name: Renovate Global Bot
on:
  schedule:
    # Was hourly ("0 * * * *"): each run pulls the 1.3GB renovate image and
    # re-clones every discovered repo through DinD — a global run saturated
    # laika's boot NVMe for 90+ min on 2026-07-16 (NodeDiskIOSaturation).
    # 4x/day off the top-of-hour spike is plenty for a personal forge.
    - cron: "15 2,8,14,20 * * *"
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  renovate:
    runs-on: ubuntu-latest
    container:
      # Major-pinned (was :latest): patch/minor updates still flow, but a major
      # bump is an explicit edit here, and repeat pulls hit cached layers far
      # more often than :latest churn. 43.265.2 was current at pin time.
      image: ghcr.io/renovatebot/renovate:43
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run Renovate
        run: renovate
        env:
          RENOVATE_PLATFORM: gitea
          RENOVATE_ENDPOINT: https://gitea.bk.glpx.pro/api/v1
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          RENOVATE_CONFIG_FILE: config.js
          RENOVATE_AUTODISCOVER: "true"
          # debug multiplied log volume across every repo of a global run;
          # Actions logs land in the gitea DB (dbfs_data) and fed the WAL bloat.
          LOG_LEVEL: info
