name: Reusable Deno CI
on:
  workflow_call:
    inputs:
      deno-version:
        description: 'Deno version to use'
        required: false
        type: string
        default: 'v2.x'
      working-directory:
        description: 'Directory containing deno.json (defaults to repo root)'
        required: false
        type: string
        default: '.'
    secrets:
      NPM_TOKEN:
        required: false
        description: 'Bare auth token for the private @glpx Gitea npm registry. Use the GLPX_NPM_TOKEN user-level secret (Vault: secret/baikonur/registry/npm-reader). Do NOT pass a full .npmrc file — the token is appended to $HOME/.npmrc so Deno picks it up regardless of working directory.'

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ inputs.deno-version }}

      - name: Setup .npmrc (if using private registry)
        if: ${{ secrets.NPM_TOKEN != '' }}
        # Write to $HOME/.npmrc (user-level) so Deno resolves auth regardless of
        # working-directory. Append so existing entries (e.g. Docker Hub) are kept.
        run: |
          printf '//gitea.bk.glpx.pro/api/packages/glpx/npm/:_authToken=%s\n' \
            "${{ secrets.NPM_TOKEN }}" >> "$HOME/.npmrc"
          printf '@glpx:registry=https://gitea.bk.glpx.pro/api/packages/glpx/npm/\n' \
            >> "$HOME/.npmrc"

      - name: Install dependencies
        run: deno ci

      - name: Run format check
        run: deno fmt --check

      - name: Run linter
        run: deno lint

      - name: Run type check
        run: deno task check

      - name: Run tests
        run: deno task test
