name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
        description: 'Optional override for the image name. Defaults to gitea.repository'
      context:
        required: false
        type: string
        default: '.'
        description: 'Docker build context. Defaults to .'
    secrets:
      HARBOR_USERNAME:
        required: true
        description: 'Harbor robot username for registry.bk.glpx.pro push.'
      HARBOR_PASSWORD:
        required: true
        description: 'Harbor robot secret.'
      NPM_TOKEN:
        required: false
        description: 'Private @glpx Gitea npm token, forwarded as a BuildKit secret (id=glpx_npm_token).'

env:
  REGISTRY: registry.bk.glpx.pro
  IMAGE_NAME: ${{ inputs.image_name || gitea.repository || github.repository }}

permissions:
  contents: read

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}-${{ inputs.image_name || 'default' }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            glpx_npm_token=${{ secrets.NPM_TOKEN }}
