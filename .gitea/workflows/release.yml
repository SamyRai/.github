name: Reusable Release
on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26'
    secrets:
      GITEA_TOKEN:
        required: true

permissions:
  contents: write
  releases: write
  packages: write

concurrency:
  group: ${{ gitea.workflow }}-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: generic
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: Install UPX
      run: |
        # The Gitea runner image includes optional vendor apt sources. They are
        # not needed for UPX and can stall release jobs before GoReleaser starts.
        sudo find /etc/apt/sources.list.d -type f -iname '*microsoft*' -delete
        sudo apt-get \
          -o Acquire::Retries=2 \
          -o Acquire::http::Timeout=20 \
          -o Acquire::https::Timeout=20 \
          update
        sudo apt-get install -y --no-install-recommends upx-ucl

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: v2.16.0
        args: release --clean
      env:
        GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
